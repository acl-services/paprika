name: Paprika CI Workflow

on:
  pull_request:
  push:
    branches:
      - master

# Cancel in-progress runs for PRs to only run latest, but allow all runs queued for master branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write # Needed to update PR body with Storybook link

jobs:
  check-packages:
    name: 🔍 Check packages changed
    runs-on: ubuntu-latest
    outputs:
      packages-changed: ${{ steps.check-packages.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && '0' || '2' }}

      - name: Check for changes in packages
        id: check-packages
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch --depth=1 origin "$BASE_REF"
            BASE_SHA="origin/$BASE_REF"
            HEAD_SHA="${{ github.sha }}"
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" --quiet -- packages/ 2>/dev/null; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              if git diff --name-only HEAD~1 HEAD --quiet -- packages/; then
                echo "changed=false" >> $GITHUB_OUTPUT
              else
                echo "changed=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          fi

  storybook-link:
    name: 🔗 Storybook link
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'synchronize')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "yarn"

      - name: Setup Yarn
        run: corepack enable

      - name: Install @octokit/rest
        run: |
          yarn add -W --no-lockfile --non-interactive --ignore-scripts @octokit/rest

      - name: Insert Storybook link into PR Body Message
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: node scripts/storybookLink.js

  format:
    name: 💅 Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Paprika
        uses: ./.github/actions/setup-paprika
        with:
          with-lerna: "false"

      - name: Lint && Prettier
        run: |
          yarn lint && yarn prettier -- --list-different

  accessibility:
    name: ♿️ Accessibility
    needs: check-packages
    runs-on: ubuntu-latest
    steps:
      - name: Skip if no package changes
        if: needs.check-packages.outputs.packages-changed != 'true'
        run: |
          echo "✅ No package changes detected, skipping accessibility tests"
          exit 0

      - name: Checkout repository
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: actions/checkout@v7

      - name: Setup Paprika
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: ./.github/actions/setup-paprika

      - name: Axe test
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: yarn test:a11y

  test:
    name: ⚡️ Integration/Unit
    needs: check-packages
    runs-on: ubuntu-latest
    steps:
      - name: Skip if no package changes
        if: needs.check-packages.outputs.packages-changed != 'true'
        run: |
          echo "✅ No package changes detected, skipping unit/integration tests"
          exit 0

      - name: Checkout repository
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: actions/checkout@v7

      - name: Setup Paprika
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: ./.github/actions/setup-paprika

      - name: JEST
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: yarn test

  e2e:
    name: ⛰ E2E
    if: false # Temporarily disabled while fixing Cypress upgrade issues
    needs: check-packages
    runs-on: ubuntu-latest
    steps:
      - name: Skip if no package changes
        if: needs.check-packages.outputs.packages-changed != 'true'
        run: |
          echo "✅ No package changes detected, skipping E2E tests"
          exit 0

      - name: Checkout repository
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: actions/checkout@v7

      - name: Install system dependencies
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get -y install --no-install-recommends xvfb libgtk-3-dev libgbm-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth

      - name: Increase file watcher limit
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: sudo sysctl fs.inotify.max_user_watches=1048576

      - name: Setup Paprika
        if: needs.check-packages.outputs.packages-changed == 'true'
        uses: ./.github/actions/setup-paprika
        with:
          with-cypress-cache: "true"

      - name: Install Cypress binary
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: npx cypress install

      - name: Cypress
        if: needs.check-packages.outputs.packages-changed == 'true'
        run: yarn cypress:ci
